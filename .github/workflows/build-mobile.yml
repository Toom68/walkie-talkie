name: Build Mobile Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate full React Native project and build APK
        run: |
          npx --yes @react-native-community/cli init WalkieTalkie --version 0.73.4 --directory rn_project --skip-git-init --skip-install
          cp -r rn_project/android ./android_full
          rm -rf rn_project

          # Merge our source into the generated project
          cp -r android_full/* android/ 2>/dev/null || true
          cp -r android_full/.* android/ 2>/dev/null || true
          rm -rf android_full

          npm install

          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WalkieTalkie-Android
          path: mobile/android/app/build/outputs/apk/release/*.apk

  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate full React Native project and build iOS
        run: |
          npx --yes @react-native-community/cli init WalkieTalkie --version 0.73.4 --directory rn_project --skip-git-init --skip-install
          cp -r rn_project/ios ./ios_full
          rm -rf rn_project

          # Merge generated iOS project with our config
          cp -r ios_full/* ios/ 2>/dev/null || true
          rm -rf ios_full

          npm install

          cd ios
          pod install

          xcodebuild -workspace WalkieTalkie.xcworkspace \
            -scheme WalkieTalkie \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath build/WalkieTalkie.xcarchive \
            archive

      - name: Create IPA
        run: |
          cd ios/build/WalkieTalkie.xcarchive/Products/Applications
          mkdir -p Payload
          cp -r WalkieTalkie.app Payload/
          zip -r ../../../../../WalkieTalkie.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WalkieTalkie-iOS
          path: mobile/ios/WalkieTalkie.ipa

  deploy-web:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: web-downloads-android
          path: web/public/downloads/
        continue-on-error: true

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        with:
          name: WalkieTalkie-iOS
          path: web/public/downloads/
        continue-on-error: true

      - name: List downloads
        run: ls -la web/public/downloads/
